name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint -w @resumeai/api
      - run: npm run build -w @resumeai/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/resumeai
          JWT_ACCESS_SECRET: ci-access-secret-at-least-32-chars-long
          JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-chars
          NODE_ENV: test

  web:
    name: Web lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build -w @resumeai/web
        env:
          NEXT_PUBLIC_API_URL: https://api.example.com/api/v1

  streamlit:
    name: Streamlit syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/streamlit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m compileall app.py pages services

  docker:
    name: Docker build API + Streamlit
    runs-on: ubuntu-latest
    needs: [api, streamlit]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: resumeai-api:ci
      - name: Build Streamlit image
        uses: docker/build-push-action@v6
        with:
          context: apps/streamlit
          file: apps/streamlit/Dockerfile
          push: false
          tags: resumeai-streamlit:ci
