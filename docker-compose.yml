services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resumeai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d resumeai"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/resumeai?schema=public
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      TRUST_PROXY: "true"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  streamlit:
    build:
      context: apps/streamlit
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: apps/streamlit/.env
        required: false
    environment:
      APP_ENV: production
      API_BASE_URL: http://api:4000/api/v1
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/resumeai
      # S3 optional locally; set via .env or MinIO profile when needed
      S3_BUCKET: ${S3_BUCKET:-}
    ports:
      - "8501:8501"
    depends_on:
      - api
      - postgres

  # Optional local S3-compatible storage for development
  minio:
    image: minio/minio:latest
    profiles: ["local-s3"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
